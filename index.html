<html lang="zh-Hant">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="養豬計畫">

    <style>
        :root {
            --gold: #ffd700; --bg: #0f0c29; --bar-bg: #1e1e3f; --success: #00ff88;
            --danger: #ff4d4d;
            --panel-bg: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .main-container { 
            width: 100%; max-width: 500px; height: 100%;
            display: flex; flex-direction: column; gap: 12px; padding: 12px; z-index: 10;
        }
        
        .glass-panel {
            background: var(--panel-bg); border-radius: 24px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
        }

        .card { padding: 20px; text-align: center; flex-shrink: 0; }
        .pig-stage-container { height: 110px; display: flex; align-items: center; justify-content: center; }
        #pig-visual { font-size: 75px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: pig-float 3s ease-in-out infinite; }
        @keyframes pig-float { 0%, 80% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        #stage-text { background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--gold); margin-top: 5px; display: inline-block; border: 1px solid rgba(255,215,0,0.3); }
        .current-amount { font-size: 3rem; font-weight: bold; color: var(--success); margin: 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.3); }
        
        .progress-wrapper { 
            background: var(--bar-bg); height: 24px; border-radius: 12px; 
            overflow: hidden; margin: 15px 0; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .progress-fill { 
            background: linear-gradient(90deg, #ff8c00, #ffd700, #00ff88); 
            width: 0%; height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
        }

        .input-group { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; margin-top: 10px; transition: 0.3s; }
        .inputs-row { display: flex; gap: 8px; }
        
        input { 
            background: var(--bar-bg); border: 2px solid var(--gold); 
            padding: 12px; border-radius: 12px; color: white; outline: none; 
            flex: 1; font-size: 1.2rem; text-align: center; font-weight: bold;
            appearance: none; -moz-appearance: textfield;
        }
        /* 達標後的輸入框樣式 */
        input:disabled { border-color: #444; color: #666; background: #111; opacity: 0.6; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-add { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); background: #fff; }
        .btn-add:disabled { background: #333; color: #777; transform: none; }

        .history-panel { flex: 1; overflow: hidden; margin-top: 5px; }
        .history-header { padding: 15px 20px; background: rgba(0,0,0,0.2); font-weight: bold; color: var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; -webkit-overflow-scrolling: touch; }
        .history-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-delete-item { position: absolute; right: 10px; top: 12px; background: none; border: none; color: #555; font-size: 1.2rem; padding: 5px; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: 0.5s; font-weight: bold; letter-spacing: 2px; }
        .level-up-flash { animation: glow 1s; }
        @keyframes glow { 50% { filter: brightness(2) drop-shadow(0 0 30px var(--gold)); } }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">🛡️ 同步數據中...</div>
    <canvas id="confetti-canvas"></canvas>

    <div class="main-container">
        <div class="glass-panel card">
            <h2 style="margin:0 0 10px 0; font-size: 1.2rem; letter-spacing: 3px; opacity: 0.9;">💰 養豬計畫 💰</h2>
            <div class="pig-stage-container"><div id="pig-visual">🐖</div></div>
            <div id="stage-text">載入中...</div>
            <div class="current-amount" id="total-display">$ 0</div>
            
            <div class="progress-wrapper"><div class="progress-fill" id="bar"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; opacity: 0.5; margin-top: -10px; padding: 0 5px;">
                <span>LV.1</span>
                <span>GOAL $88,888</span>
            </div>
            
            <div class="input-group" id="input-container">
                <div class="inputs-row">
                    <input type="number" id="money-input" placeholder="投入飼料" inputmode="numeric">
                    <button class="btn-add" id="btn-deposit">餵養</button>
                </div>
            </div>
        </div>

        <div class="glass-panel history-panel">
            <div class="history-header">
                <span>📜 豬仔日誌</span>
                <button onclick="clearData()" style="background:none; border:1px solid var(--danger); color:var(--danger); border-radius:8px; padding:4px 12px; font-size:0.75rem; font-weight: bold;">全清</button>
            </div>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1ZbRISZunnzBapdMk-VZiYbq2PFIU7Vw",
            authDomain: "mimi-healthy.firebaseapp.com",
            projectId: "mimi-healthy",
            storageBucket: "mimi-healthy.firebasestorage.app",
            messagingSenderId: "550078016256",
            appId: "1:550078016256:web:23bf5effdbb337def7a1e5",
            measurementId: "G-PFC5XYGC6F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userDocRef = doc(db, "savings", "aligned_piggy_quest");

        let userData = { total: 0, history: [], lastStage: 1 };
        const target = 88888;

        async function loadData() {
            try {
                const docSnap = await getDoc(userDocRef);
                if (docSnap.exists()) userData = docSnap.data();
                else await setDoc(userDocRef, userData);
            } catch(e) { console.error(e); }
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            updateUI(false);
        }

        function getMealType(amount) {
            if (amount <= 500) return "🌽 一般飼料";
            if (amount <= 2000) return "🍱 日式便當";
            if (amount <= 5000) return "🦐 自助餐吃到飽";
            if (amount <= 10000) return "🍷 法國料理";
            return "👑 奢華滿漢全席";
        }

        window.deposit = async function() {
            if (userData.total >= target) return; // 再次檢查，防止極端情況

            const mInput = document.getElementById('money-input');
            const val = parseFloat(mInput.value);
            if (isNaN(val) || val <= 0) return;

            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            // 達標計算
            userData.total = Math.min(userData.total + val, target);
            userData.history.unshift({ id: Date.now(), time: timeStr, amount: val, note: getMealType(val) });

            updateUI(true);
            mInput.value = '';
            
            // 達標後隱藏鍵盤
            if (userData.total >= target) {
                mInput.blur();
            }
            
            await updateDoc(userDocRef, { total: userData.total, history: userData.history });
        }

        window.deleteItem = async function(id, amount) {
            if (!confirm(`要收回這筆 $${amount.toLocaleString()} 嗎？`)) return;
            userData.history = userData.history.filter(item => item.id !== id);
            userData.total = Math.max(0, userData.total - amount);
            let ratio = userData.total / target;
            userData.lastStage = Math.floor(ratio * 12) + 1;
            updateUI(false);
            await updateDoc(userDocRef, { total: userData.total, history: userData.history, lastStage: userData.lastStage });
        }

        window.clearData = async function() {
            if (!confirm("⚠️ 確定要全清嗎？")) return;
            userData = { total: 0, history: [], lastStage: 1 };
            updateUI(false);
            await setDoc(userDocRef, userData);
        }

        function updateUI(canCelebrate) {
            document.getElementById('total-display').innerText = '$' + userData.total.toLocaleString();
            let ratio = userData.total / target;
            document.getElementById('bar').style.width = (ratio * 100) + '%';
            
            // 達標鎖定判斷
            const mInput = document.getElementById('money-input');
            const btnAdd = document.getElementById('btn-deposit');
            
            if (userData.total >= target) {
                mInput.disabled = true;
                btnAdd.disabled = true;
                btnAdd.innerText = "已達標 🏆";
                mInput.placeholder = "恭喜完成！";
            } else {
                mInput.disabled = false;
                btnAdd.disabled = false;
                btnAdd.innerText = "餵養";
                mInput.placeholder = "投入飼料";
            }

            let currentStage = Math.min(Math.floor(ratio * 12) + 1, 12);
            const stages = [
                { e: '🐽', t: '小豬鼻子 (LV.1)' }, { e: '🐷', t: '粉紅幼豬 (LV.2)' },
                { e: '🐖', t: '成長小豬 (LV.3)' }, { e: '🐗', t: '野性山豬 (LV.4)' },
                { e: '💰', t: '背金福豬 (LV.5)' }, { e: '🛡️', t: '鋼鐵護衛 (LV.6)' },
                { e: '⚔️', t: '英勇勇者 (LV.7)' }, { e: '✨', t: '魔力爆發 (LV.8)' },
                { e: '💎', t: '鑽石巨神 (LV.9)' }, { e: '👼', t: '雲端天使 (LV.10)' },
                { e: '🔥', t: '涅槃鳳凰 (LV.11)' }, { e: '👑', t: '財富之王 (LV.12)' }
            ];

            const s = stages[currentStage - 1];
            const pig = document.getElementById('pig-visual');
            pig.innerText = s.e;
            pig.style.fontSize = (55 + currentStage * 3) + 'px';
            document.getElementById('stage-text').innerText = s.t;

            if (canCelebrate && (currentStage > userData.lastStage || userData.total >= target)) {
                startConfetti();
                pig.classList.add('level-up-flash');
                setTimeout(() => pig.classList.remove('level-up-flash'), 1000);
                userData.lastStage = currentStage;
                updateDoc(userDocRef, { lastStage: currentStage });
            }
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = userData.history.length ? '' : '<li style="text-align:center;padding-top:40px;opacity:0.2;">尚未開始...</li>';
            userData.history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <button class="btn-delete-item" onclick="deleteItem(${item.id}, ${item.amount})">×</button>
                    <div style="display:flex; justify-content:space-between; font-weight:bold; padding-right:25px;">
                        <span style="font-size:0.8rem; opacity:0.6;">${item.time}</span>
                        <span style="color:var(--gold)">+$${item.amount.toLocaleString()}</span>
                    </div>
                    <div style="color:var(--success); font-size:0.85rem; margin-top:3px;">${item.note}</div>`;
                list.appendChild(li);
            });
        }

        document.getElementById('btn-deposit').onclick = deposit;
        loadData();

        let canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d'), pieces = [], animId;
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        function startConfetti() {
            pieces = Array.from({length:70}, () => ({
                x: Math.random()*canvas.width, y: -20, r: Math.random()*360, 
                c: ['#ffd700', '#00ff88', '#ff99cc', '#ffffff'][Math.floor(Math.random()*4)], 
                s: Math.random()*6+4, sp: Math.random()*4+3, op: 1
            }));
            cancelAnimationFrame(animId); animate();
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach((p,i) => {
                p.y += p.sp; p.op -= 0.008;
                ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
                ctx.globalAlpha = p.op; ctx.fillStyle = p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore();
                if(p.op <= 0) pieces.splice(i,1);
            });
            if(pieces.length > 0) animId = requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
